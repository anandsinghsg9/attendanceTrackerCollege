<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .container {
            max-width: 400px;
            margin: auto;
        }
        label, input {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .output {
            margin-top: 20px;
            font-size: 1.2em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Attendance Calculator</h1>
        <label for="totalClasses">Total Classes</label>
        <input type="text" id="totalClasses">
        
        <label for="attendedClasses">Classes Attended</label>
        <input type="text" id="attendedClasses">
        
        <label for="neededPercentage">Percentage Needed</label>
        <input type="text" id="neededPercentage">
        
        <button onclick="calculateAttendance()">Calculate</button>
        
        <div class="output" id="output"></div>
    </div>

    <script>
        function calculateAttendance() {
            const totalClasses = parseFloat(document.getElementById('totalClasses').value);
            const attendedClasses = parseFloat(document.getElementById('attendedClasses').value);
            const neededPercentage = parseFloat(document.getElementById('neededPercentage').value);

            var q = (neededPercentage * totalClasses);
            var e = (100 * attendedClasses);
            var r = (100-neededPercentage);
            var ab = (attendedClasses / totalClasses)*100;
            var curr_attendance = Math.round(ab);
            var ac = (q-e)/r;
            var result = ("you need to attend " +ac+ " classes");

            var printif = ("you alread have required percent attendance" +"<br>"+"your current attendance is " +ab);
                var percent = ("Your current attendance is "+curr_attendance+"% <br>" + result);
            var printing;
            if(ac < 0){
                <!-- printing += printif; -->
                document.getElementById("output").innerHTML = printif;
            }
            else{
                document.getElementById("output").innerHTML = percent;

            }

            

        }
    </script>
</body>
</html>
